name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted Publishing requires npm >= 11.5.1. Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Derive dist-tag from version
        id: disttag
        working-directory: packages/sdk
        run: |
          version=$(node -p "require('./package.json').version")
          case "$version" in
            *-alpha.*) tag=alpha ;;
            *-beta.*)  tag=beta ;;
            *-rc.*)    tag=rc ;;
            *)         tag=latest ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing $version to dist-tag: $tag"

      # Auth is via Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # Provenance is automatic when publishing via OIDC; the flag is kept for clarity.
      - name: Publish to npm
        working-directory: packages/sdk
        run: npm publish --tag "${{ steps.disttag.outputs.tag }}" --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=""
          case "$GITHUB_REF_NAME" in *-*) prerelease_flag="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $prerelease_flag
