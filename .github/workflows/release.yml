name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - patch
          - minor
          - major
      explicit_version:
        description: 'Optional explicit version (e.g. 3.0.0). If set, overrides release_type.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted Publishing requires npm >= 11.5.1. Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          EXPLICIT_VERSION: ${{ inputs.explicit_version }}
        run: |
          if [ -n "$EXPLICIT_VERSION" ]; then
            npm version "$EXPLICIT_VERSION" --workspace @credit-cooperative/platform-sdk --no-git-tag-version
          elif [ "$RELEASE_TYPE" = "alpha" ] || [ "$RELEASE_TYPE" = "beta" ] || [ "$RELEASE_TYPE" = "rc" ]; then
            npm version prerelease --preid="$RELEASE_TYPE" --workspace @credit-cooperative/platform-sdk --no-git-tag-version
          else
            npm version "$RELEASE_TYPE" --workspace @credit-cooperative/platform-sdk --no-git-tag-version
          fi
          new_version=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"
          echo "New version: $new_version"

      - name: Commit, tag, and push
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git add packages/sdk/package.json package-lock.json
          git commit -m "release: $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin main --follow-tags

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Derive npm dist-tag
        id: disttag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          case "$VERSION" in
            *-alpha.*) tag=alpha ;;
            *-beta.*)  tag=beta ;;
            *-rc.*)    tag=rc ;;
            *)         tag=latest ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION to dist-tag: $tag"

      # Auth via Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # Provenance is automatic when publishing via OIDC; the flag is kept for clarity.
      - name: Publish to npm
        working-directory: packages/sdk
        run: npm publish --tag "${{ steps.disttag.outputs.tag }}" --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          prerelease_flag=""
          case "$TAG" in *-*) prerelease_flag="--prerelease" ;; esac
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $prerelease_flag
